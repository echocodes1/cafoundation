<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA Foundation · 50-Day Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFE6C9;
    --paper-line:#DBCBA0;
    --card:#FBF5E4;
    --card-line:#DED0A6;
    --ink:#20304C;
    --ink-soft:#5B6C86;
    --ink-faint:#93927f;
    --margin-red:#A2402E;
    --seal:#7C2350;
    --gold:#AD7F26;
    --green:#3C6E47;
    --amber:#B4802A;
    --danger:#A2402E;
    --radius:4px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image: repeating-linear-gradient(to bottom, transparent 0px 30px, var(--paper-line) 30px 31px);
    font-family:'Inter', system-ui, sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .page{
    position:relative;
    max-width:920px;
    margin:0 auto;
    padding:28px 18px 70px 46px;
  }
  .page::before{
    content:"";
    position:absolute;
    top:0; bottom:0; left:26px;
    width:2px;
    background:var(--margin-red);
    opacity:.55;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(26px,5vw,38px);
    margin:4px 0 2px;
    line-height:1.05;
  }
  h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:19px;
    margin:0 0 12px;
  }
  .rule{
    border:none;
    border-top:2px solid var(--ink);
    border-bottom:1px solid var(--ink);
    height:4px;
    margin:14px 0 22px;
    opacity:.85;
  }
  .card{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:var(--radius);
    box-shadow:0 1px 2px rgba(32,48,76,.08);
    padding:18px;
    margin-bottom:18px;
  }
  /* header total row */
  .total-row{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    align-items:center;
    justify-content:space-between;
  }
  .total-block{font-family:'IBM Plex Mono', monospace;}
  .total-block .num{font-size:28px; font-weight:600;}
  .total-block .lbl{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.08em;}
  .arrow{color:var(--ink-faint); font-size:20px;}
  .target-num{color:var(--seal);}
  .progress-outer{
    height:10px; background:#e4d9b8; border-radius:6px; overflow:hidden; margin-top:10px;
    border:1px solid var(--card-line);
  }
  .progress-inner{height:100%; background:var(--green); transition:width .4s ease;}

  /* subject cards */
  .subjects-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  @media(min-width:680px){ .subjects-grid{grid-template-columns:repeat(4,1fr);} }
  .subj-card{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:var(--radius);
    padding:12px 12px 14px;
  }
  .subj-card .paper-tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft);
  }
  .subj-card .subj-name{font-weight:700; font-size:14px; margin:2px 0 8px;}
  .subj-card .marks-row{display:flex; align-items:baseline; gap:6px; font-family:'IBM Plex Mono', monospace;}
  .subj-card .marks-row .cur{font-size:20px; font-weight:600;}
  .subj-card .marks-row .tgt{font-size:12px; color:var(--ink-soft);}
  .subj-card .exam-date{font-size:11px; color:var(--ink-faint); margin-top:6px;}
  .subj-bar{height:6px; background:#e4d9b8; border-radius:4px; margin-top:8px; overflow:hidden; border:1px solid var(--card-line);}
  .subj-bar-inner{height:100%;}

  /* phase timeline */
  .phase-track{position:relative; height:34px; margin-top:6px;}
  .phase-band{position:absolute; top:10px; height:14px; border-radius:3px; font-size:0;}
  .phase-labels{display:flex; font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--ink-soft); justify-content:space-between; margin-top:4px;}
  .today-marker{
    position:absolute; top:0; width:2px; height:34px; background:var(--margin-red);
  }
  .today-marker::after{
    content:"TODAY"; position:absolute; top:-16px; left:50%; transform:translateX(-50%);
    font-family:'IBM Plex Mono', monospace; font-size:9px; letter-spacing:.06em; color:var(--margin-red); white-space:nowrap;
  }

  /* day navigator */
  .day-nav{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
  .day-nav button{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:.05em;
    background:var(--ink); color:var(--card); border:none; border-radius:3px;
    padding:8px 12px; cursor:pointer;
  }
  .day-nav button.ghost{background:transparent; color:var(--ink); border:1px solid var(--ink-soft);}
  .day-nav button:active{transform:translateY(1px);}
  .day-nav input[type=range]{flex:1; min-width:120px;}
  .day-title{font-family:'Fraunces', serif; font-weight:600; font-size:20px; min-width:170px;}
  .week-badge{
    display:inline-block; font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:.08em;
    text-transform:uppercase; background:#e4d9b8; color:var(--ink-soft); padding:3px 8px; border-radius:3px; margin-left:8px;
  }

  .subject-row{
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:10px 14px;
    align-items:center;
    padding:10px 0;
    border-bottom:1px dashed var(--card-line);
  }
  .subject-row:last-child{border-bottom:none;}
  .subject-row .name{font-weight:700; font-size:13px;}
  .subject-row .focus{font-size:12.5px; color:var(--ink-soft); font-weight:400; display:block; margin-top:2px;}
  .subject-row label.check{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft); cursor:pointer;}
  .subject-row input[type=checkbox]{width:18px; height:18px; accent-color:var(--green); cursor:pointer;}
  .subject-row input[type=number]{
    width:58px; font-family:'IBM Plex Mono', monospace; font-size:13px;
    border:1px solid var(--card-line); border-radius:3px; padding:5px 6px; background:#fff;
  }
  .subject-row .hrs-lbl{font-size:10px; color:var(--ink-faint); display:block; text-align:center; margin-top:2px;}

  .stamp-zone{display:flex; align-items:center; justify-content:space-between; margin-top:14px; gap:12px; flex-wrap:wrap;}
  .stamp-btn{
    font-family:'IBM Plex Mono', monospace; font-size:12.5px; letter-spacing:.05em; text-transform:uppercase;
    background:var(--seal); color:#fbf5e4; border:none; border-radius:3px; padding:10px 16px; cursor:pointer;
  }
  .stamp-btn[disabled]{opacity:.55; cursor:default;}
  .seal{
    font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:11px; letter-spacing:.05em;
    color:var(--seal); border:3px double var(--seal); border-radius:50%;
    width:78px; height:78px; display:flex; align-items:center; justify-content:center; text-align:center;
    transform:rotate(-9deg); mix-blend-mode:multiply; line-height:1.2; padding:4px;
    animation:stamp .3s ease-out;
  }
  @keyframes stamp{
    0%{transform:rotate(-9deg) scale(2.4); opacity:0;}
    60%{transform:rotate(-9deg) scale(.92); opacity:1;}
    100%{transform:rotate(-9deg) scale(1); opacity:.9;}
  }

  /* dashboard */
  .dash-grid{display:grid; grid-template-columns:1fr; gap:14px;}
  @media(min-width:680px){ .dash-grid{grid-template-columns:1fr 1fr;} }
  .streak-num{font-family:'IBM Plex Mono', monospace; font-size:34px; font-weight:600; color:var(--seal);}
  .small-lbl{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);}

  /* mock log */
  .mock-form{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .mock-form select, .mock-form input{
    font-family:'Inter', sans-serif; font-size:13px; padding:8px 9px; border:1px solid var(--card-line);
    border-radius:3px; background:#fff;
  }
  .mock-form button{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:.05em; text-transform:uppercase;
    background:var(--ink); color:var(--card); border:none; border-radius:3px; padding:9px 14px; cursor:pointer;
  }
  .mock-row{display:grid; grid-template-columns:90px 1fr 40px 26px; align-items:center; gap:10px; padding:6px 0; font-size:12.5px;}
  .mock-bar-outer{height:8px; background:#e4d9b8; border-radius:4px; overflow:hidden; border:1px solid var(--card-line);}
  .mock-bar-inner{height:100%;}
  .mock-del{cursor:pointer; color:var(--ink-faint); font-size:14px; text-align:center;}
  .mock-empty{font-size:12.5px; color:var(--ink-faint); font-style:italic;}

  /* reference */
  .ref-list{margin:0; padding-left:18px; font-size:13px; line-height:1.7; color:var(--ink);}
  .ref-list b{color:var(--seal);}

  .setup-card{max-width:420px; margin:60px auto; text-align:center;}
  .setup-card input[type=date]{
    font-family:'IBM Plex Mono', monospace; font-size:14px; padding:9px; border:1px solid var(--card-line);
    border-radius:3px; margin:12px 0; width:100%;
  }
  .setup-card button{
    font-family:'IBM Plex Mono', monospace; font-size:13px; letter-spacing:.05em; text-transform:uppercase;
    background:var(--seal); color:#fbf5e4; border:none; border-radius:3px; padding:11px 18px; cursor:pointer; width:100%;
  }
  .reset-link{
    display:block; text-align:center; font-size:11px; color:var(--ink-faint); margin-top:24px; cursor:pointer;
    text-decoration:underline;
  }
  .footnote{font-size:11px; color:var(--ink-faint); text-align:center; margin-top:6px;}
</style>
</head>
<body>
<div class="page" id="app">Loading your ledger…</div>

<script>
const STORAGE_KEY = 'ca-foundation-50day-tracker-v1';
const SUBJECTS = {
  accounting: { label:'Paper 1 · Accounting', base:45, target:88, examDate:new Date(2026,8,2), color:'#3C6E47' },
  law:        { label:'Paper 2 · Business Laws', base:35, target:82, examDate:new Date(2026,8,5), color:'#A2402E' },
  quant:      { label:'Paper 3 · Quant. Aptitude', base:54, target:90, examDate:new Date(2026,8,7), color:'#B4802A' },
  economics:  { label:'Paper 4 · Business Economics', base:52, target:90, examDate:new Date(2026,8,9), color:'#7C2350' }
};
const SUBJECT_KEYS = Object.keys(SUBJECTS);

const WEEK_PLAN = {
  1:{ phase:1, accounting:'Theoretical Framework + Journal, Ledger, Trial Balance, Subsidiary Books', law:'Regulatory Framework overview + Contract Act: Offer, Acceptance, Consideration, Capacity', quant:'Ratio & Proportion, Indices & Logarithms, Time Value of Money (start)', economics:'Nature & Scope of Business Economics + Theory of Demand (start)'},
  2:{ phase:1, accounting:'Rectification of Errors + Bank Reconciliation Statement', law:'Contract Act: Free Consent, Void Agreements, Performance, Discharge, Breach & Remedies — daily practical problems', quant:'Time Value of Money (complete) + Equations & Linear Inequalities', economics:'Theory of Demand & Supply — elasticity, graphs, numericals'},
  3:{ phase:1, accounting:'Inventory Valuation (FIFO/Wtd. Avg) + Depreciation (SLM/WDV) + START Final Accounts — basic adjustments', law:"Special Contracts: Indemnity & Guarantee, Bailment & Pledge, Agency — case studies daily", quant:'Permutation & Combination, Sequence & Series, Sets/Relations/Functions', economics:'Theory of Production & Cost'},
  4:{ phase:2, accounting:'Final Accounts of Sole Proprietorship — advanced adjustments + Manufacturing A/c (2 problems/day)', law:"Sale of Goods Act — Conditions & Warranties, Transfer of Ownership, Unpaid Seller's Rights", quant:'Logical Reasoning — series, coding-decoding, direction sense, blood relations, seating, syllogisms', economics:'Price Determination — Perfect Competition & Monopoly'},
  5:{ phase:2, accounting:'Partnership Accounts — P&L Appropriation, Capital Accounts, Admission/Retirement basics', law:'Indian Partnership Act 1932 + LLP Act 2008 basics', quant:'Statistics — Measures of Central Tendency & Dispersion', economics:'Price Determination — Monopolistic Competition & Oligopoly'},
  6:{ phase:2, accounting:'Company Accounts intro (share capital, issue of shares) + NPO Financial Statements', law:'Companies Act 2013 basics — types of companies, incorporation, MOA/AOA', quant:'Statistics — Correlation & Regression, Probability, Index Numbers', economics:'Business Cycles + National Income concepts'},
  7:{ phase:3, accounting:'Full mocks — Sole Prop + Partnership + Company + NPO + Ratio Analysis/Cash Flow basics', law:"Full 3-hour mock papers + revise every Act's practical problems (RTP/MTP)", quant:'Full 100-MCQ timed mocks + error log + refine attempt-vs-skip strategy', economics:'Full 100-MCQ timed mocks + Money & Banking, Public Finance, Intl Trade quick pass'}
};
const PHASES = {
  1:{name:'Foundation Rebuild', range:'Day 1–21', color:'#B4802A'},
  2:{name:'Full Syllabus + Heavy Practice', range:'Day 22–42', color:'#3C6E47'},
  3:{name:'Mock Test Sprint', range:'Day 43–50', color:'#7C2350'}
};

function weekForDay(d){
  if(d<=7) return 1; if(d<=14) return 2; if(d<=21) return 3; if(d<=28) return 4;
  if(d<=35) return 5; if(d<=42) return 6; return 7;
}
function fmtDate(d){ return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}); }
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function daysBetween(a,b){ const MS=86400000; const A=new Date(a.getFullYear(),a.getMonth(),a.getDate()); const B=new Date(b.getFullYear(),b.getMonth(),b.getDate()); return Math.round((B-A)/MS); }

let state = { startDate:null, days:{}, mocks:[] };
let selectedDay = 1;
let saveTimer = null;

function emptyDay(){
  const s={};
  SUBJECT_KEYS.forEach(k=>s[k]={done:false,hours:0});
  return {subjects:s, stamped:false};
}
function getDay(n){
  if(!state.days[n]) state.days[n]=emptyDay();
  return state.days[n];
}

async function loadState(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state = Object.assign({startDate:null,days:{},mocks:[]}, parsed);
    }
  }catch(e){
    // no saved state yet — first run
    state = { startDate:null, days:{}, mocks:[] };
  }
}
function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 350);
}
async function saveState(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
  }catch(e){
    console.error('Could not save your ledger, will retry on next change.', e);
  }
}

function todayIndex(){
  if(!state.startDate) return null;
  const start = new Date(state.startDate+'T00:00:00');
  const idx = daysBetween(start, new Date()) + 1;
  return idx;
}

function subjectLatestMock(key){
  const entries = state.mocks.filter(m=>m.subject===key);
  if(entries.length===0) return null;
  return entries[entries.length-1].score;
}

function totalCurrentMarks(){
  return SUBJECT_KEYS.reduce((sum,k)=>{
    const latest = subjectLatestMock(k);
    return sum + (latest!==null ? latest : SUBJECTS[k].base);
  },0);
}
function totalTargetMarks(){
  return SUBJECT_KEYS.reduce((s,k)=>s+SUBJECTS[k].target,0);
}

function computeStreak(){
  let streak=0;
  for(let d=1; d<=50; d++){
    if(state.days[d] && state.days[d].stamped) streak++; else break;
  }
  return streak;
}
function totalHoursLogged(){
  let total=0;
  Object.values(state.days).forEach(day=>{
    SUBJECT_KEYS.forEach(k=>{ total += Number(day.subjects[k].hours)||0; });
  });
  return Math.round(total*10)/10;
}

function render(){
  const app = document.getElementById('app');
  if(!state.startDate){ app.innerHTML = renderSetup(); attachSetupHandlers(); return; }

  const tIdx = todayIndex();
  const currentTotal = totalCurrentMarks();
  const targetTotal = totalTargetMarks();
  const pct = Math.min(100, Math.round((currentTotal/targetTotal)*100));

  app.innerHTML = `
    ${renderHeader(tIdx, currentTotal, targetTotal, pct)}
    ${renderSubjectCards()}
    ${renderPhaseTrack(tIdx)}
    ${renderDayCard()}
    ${renderDashboard()}
    ${renderMockLog()}
    ${renderReference()}
    <span class="reset-link" id="resetLink">Reset all ledger data</span>
    <div class="footnote">Data is stored privately on this device/account only.</div>
  `;
  attachHandlers();
}

function renderHeader(tIdx, currentTotal, targetTotal, pct){
  const examDate = new Date(2026,8,2);
  const now = new Date();
  const daysToExam = daysBetween(now, examDate);
  return `
  <div class="eyebrow">CA Foundation · September 2026 Attempt</div>
  <h1>The 50-Day Ledger</h1>
  <div class="eyebrow">${tIdx!==null && tIdx>=1 && tIdx<=50 ? 'Day '+tIdx+' of 50' : (tIdx!==null && tIdx>50 ? '50-day plan complete — final revision window' : 'Starts '+fmtDate(new Date(state.startDate+'T00:00:00')))} · Paper 1 begins in ${daysToExam} day${daysToExam===1?'':'s'} (2 Sep)</div>
  <hr class="rule">
  <div class="card">
    <div class="total-row">
      <div class="total-block"><div class="num">${currentTotal}</div><div class="lbl">Current total /400</div></div>
      <div class="arrow">→</div>
      <div class="total-block"><div class="num target-num">${targetTotal}+</div><div class="lbl">Your target</div></div>
      <div class="total-block" style="margin-left:auto;"><div class="num">${pct}%</div><div class="lbl">of target reached</div></div>
    </div>
    <div class="progress-outer"><div class="progress-inner" style="width:${pct}%;"></div></div>
  </div>`;
}

function renderSubjectCards(){
  const now = new Date();
  const cards = SUBJECT_KEYS.map(k=>{
    const s = SUBJECTS[k];
    const latest = subjectLatestMock(k);
    const cur = latest!==null ? latest : s.base;
    const pct = Math.min(100, Math.round((cur/s.target)*100));
    const dLeft = daysBetween(now, s.examDate);
    return `
      <div class="subj-card">
        <div class="paper-tag">${s.label.split('·')[0].trim()}</div>
        <div class="subj-name">${s.label.split('·')[1].trim()}</div>
        <div class="marks-row"><span class="cur">${cur}</span><span class="tgt">→ ${s.target} target</span></div>
        <div class="subj-bar"><div class="subj-bar-inner" style="width:${pct}%; background:${s.color};"></div></div>
        <div class="exam-date">${latest!==null?'Latest mock':'Last exam'} · Paper due in ${dLeft}d</div>
      </div>`;
  }).join('');
  return `<h2>Where each paper stands</h2><div class="subjects-grid">${cards}</div>`;
}

function renderPhaseTrack(tIdx){
  const clampedIdx = tIdx===null ? 1 : Math.max(1, Math.min(50, tIdx));
  const leftPct = ((clampedIdx-1)/50)*100;
  const bands = Object.entries(PHASES).map(([num,p])=>{
    const startDay = num=='1'?1:num=='2'?22:43;
    const endDay = num=='1'?21:num=='2'?42:50;
    const left = ((startDay-1)/50)*100;
    const width = ((endDay-startDay+1)/50)*100;
    return `<div class="phase-band" style="left:${left}%; width:${width}%; background:${p.color};"></div>`;
  }).join('');
  const showMarker = tIdx!==null && tIdx>=1 && tIdx<=50;
  return `
  <div class="card">
    <h2>Phase map</h2>
    <div class="phase-track">
      ${bands}
      ${showMarker?`<div class="today-marker" style="left:${leftPct}%;"></div>`:''}
    </div>
    <div class="phase-labels">
      <span>① Foundation Rebuild<br>Day 1–21</span>
      <span>② Full Syllabus + Practice<br>Day 22–42</span>
      <span>③ Mock Sprint<br>Day 43–50</span>
    </div>
  </div>`;
}

function renderDayCard(){
  const day = getDay(selectedDay);
  const week = weekForDay(selectedDay);
  const plan = WEEK_PLAN[week];
  const phase = PHASES[plan.phase];
  const rows = SUBJECT_KEYS.map(k=>{
    const s = SUBJECTS[k];
    const rec = day.subjects[k];
    return `
    <div class="subject-row">
      <div>
        <span class="name">${s.label}</span>
        <span class="focus">${plan[k]}</span>
      </div>
      <label class="check">
        <input type="checkbox" data-subj="${k}" class="studied-box" ${rec.done?'checked':''}>
        studied
      </label>
      <div>
        <input type="number" min="0" max="14" step="0.5" data-subj="${k}" class="hours-input" value="${rec.hours||0}">
        <span class="hrs-lbl">hrs</span>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="card">
    <div class="day-nav">
      <button class="ghost" id="prevDay">‹ Prev</button>
      <div class="day-title">Day ${selectedDay}<span class="week-badge">Week ${week} · ${phase.name}</span></div>
      <button class="ghost" id="nextDay">Next ›</button>
    </div>
    <input type="range" id="daySlider" min="1" max="50" value="${selectedDay}">
    <div style="margin-top:16px;">${rows}</div>
    <div class="stamp-zone">
      <button class="stamp-btn" id="stampBtn" ${day.stamped?'disabled':''}>${day.stamped?'Day sealed':'Mark day complete'}</button>
      ${day.stamped?`<div class="seal">DAY ${selectedDay}<br>CLEARED</div>`:''}
    </div>
  </div>`;
}

function renderDashboard(){
  const streak = computeStreak();
  const hrs = totalHoursLogged();
  const targetHrs = 425;
  const hrsPct = Math.min(100, Math.round((hrs/targetHrs)*100));
  return `
  <div class="dash-grid">
    <div class="card">
      <div class="small-lbl">Current streak</div>
      <div class="streak-num">${streak} day${streak===1?'':'s'}</div>
      <div class="small-lbl" style="margin-top:6px;">Unbroken from Day 1</div>
    </div>
    <div class="card">
      <div class="small-lbl">Hours logged</div>
      <div class="streak-num" style="color:var(--green);">${hrs}<span style="font-size:16px; color:var(--ink-soft);"> / ~${targetHrs}</span></div>
      <div class="progress-outer" style="margin-top:8px;"><div class="progress-inner" style="width:${hrsPct}%;"></div></div>
    </div>
  </div>`;
}

function renderMockLog(){
  const mocks = state.mocks.slice().reverse();
  const rows = mocks.length===0 ? `<div class="mock-empty">No mock scores logged yet — add one after your first sectional or full test.</div>` :
    mocks.map(m=>{
      const s = SUBJECTS[m.subject];
      const color = m.score>=80?'var(--green)': m.score>=60?SUBJECTS[m.subject].color : m.score>=40?'var(--amber)':'var(--danger)';
      return `
      <div class="mock-row">
        <span>${m.date}</span>
        <div>
          <div style="font-size:11.5px; margin-bottom:3px;">${s.label}</div>
          <div class="mock-bar-outer"><div class="mock-bar-inner" style="width:${m.score}%; background:${color};"></div></div>
        </div>
        <span style="font-family:'IBM Plex Mono',monospace; text-align:right;">${m.score}</span>
        <span class="mock-del" data-id="${m.id}">✕</span>
      </div>`;
    }).join('');

  const options = SUBJECT_KEYS.map(k=>`<option value="${k}">${SUBJECTS[k].label}</option>`).join('');
  return `
  <div class="card">
    <h2>Mock test log</h2>
    <div class="mock-form">
      <select id="mockSubject">${options}</select>
      <input type="number" id="mockScore" min="0" max="100" placeholder="Score /100" style="width:100px;">
      <button id="addMock">Add score</button>
    </div>
    ${rows}
  </div>`;
}

function renderReference(){
  return `
  <div class="card">
    <h2>Rules of the exam, at a glance</h2>
    <ul class="ref-list">
      <li><b>Pass mark:</b> 40% (40/100) minimum in every paper — no paper can be neglected below this, whatever your total.</li>
      <li><b>Aggregate:</b> 50% overall (200/400) required alongside the 40% minimums.</li>
      <li><b>Papers 1 & 2</b> (Accounting, Law) are descriptive — no negative marking, but presentation and workings earn marks.</li>
      <li><b>Papers 3 & 4</b> (Quant, Economics) are MCQ — <b>−0.25</b> for each wrong answer.</li>
      <li><b>Guessing math:</b> with 4 options, a blind guess is 0.25×(+1) − 0.75×(0.25) = <b>+0.0625 expected value</b> — so don't leave MCQs blank. Eliminate one wrong option first if you can, then answer.</li>
    </ul>
  </div>`;
}

function renderSetup(){
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  return `
  <div class="card setup-card">
    <div class="eyebrow">CA Foundation · September 2026</div>
    <h1 style="font-size:26px;">Start your 50-day ledger</h1>
    <p style="font-size:13.5px; color:var(--ink-soft);">Pick the date Day 1 begins. The ledger will track every day from here through your Sept 2 Paper&nbsp;1.</p>
    <input type="date" id="startDateInput" value="${ymd(tomorrow)}">
    <button id="beginBtn">Begin Day 1</button>
  </div>`;
}

function attachSetupHandlers(){
  document.getElementById('beginBtn').addEventListener('click', ()=>{
    const val = document.getElementById('startDateInput').value;
    if(!val) return;
    state.startDate = val;
    selectedDay = 1;
    queueSave();
    render();
  });
}

function attachHandlers(){
  const resetLink = document.getElementById('resetLink');
  if(resetLink) resetLink.addEventListener('click', async ()=>{
    if(confirm('This clears every day, hour, and mock score you have logged. Continue?')){
      state = {startDate:null, days:{}, mocks:[]};
      try{ await window.storage.delete(STORAGE_KEY, false); }catch(e){}
      selectedDay = 1;
      render();
    }
  });

  const prev = document.getElementById('prevDay');
  const next = document.getElementById('nextDay');
  const slider = document.getElementById('daySlider');
  if(prev) prev.addEventListener('click', ()=>{ selectedDay=Math.max(1,selectedDay-1); render(); });
  if(next) next.addEventListener('click', ()=>{ selectedDay=Math.min(50,selectedDay+1); render(); });
  if(slider) slider.addEventListener('input', (e)=>{ selectedDay=Number(e.target.value); render(); });

  document.querySelectorAll('.studied-box').forEach(box=>{
    box.addEventListener('change', (e)=>{
      const k = e.target.getAttribute('data-subj');
      getDay(selectedDay).subjects[k].done = e.target.checked;
      queueSave();
    });
  });
  document.querySelectorAll('.hours-input').forEach(inp=>{
    inp.addEventListener('change', (e)=>{
      const k = e.target.getAttribute('data-subj');
      let v = parseFloat(e.target.value); if(isNaN(v)||v<0) v=0;
      getDay(selectedDay).subjects[k].hours = v;
      queueSave();
      render();
    });
  });

  const stampBtn = document.getElementById('stampBtn');
  if(stampBtn) stampBtn.addEventListener('click', ()=>{
    getDay(selectedDay).stamped = true;
    queueSave();
    render();
  });

  const addMock = document.getElementById('addMock');
  if(addMock) addMock.addEventListener('click', ()=>{
    const subj = document.getElementById('mockSubject').value;
    let score = parseFloat(document.getElementById('mockScore').value);
    if(isNaN(score)) return;
    score = Math.max(0, Math.min(100, score));
    state.mocks.push({ id: Date.now(), date: ymd(new Date()), subject: subj, score: score });
    queueSave();
    render();
  });
  document.querySelectorAll('.mock-del').forEach(el=>{
    el.addEventListener('click', (e)=>{
      const id = Number(e.target.getAttribute('data-id'));
      state.mocks = state.mocks.filter(m=>m.id!==id);
      queueSave();
      render();
    });
  });
}

(async function init(){
  await loadState();
  const tIdx = todayIndex();
  selectedDay = tIdx!==null ? Math.max(1, Math.min(50, tIdx)) : 1;
  render();
})();
</script>
</body>
</html>
